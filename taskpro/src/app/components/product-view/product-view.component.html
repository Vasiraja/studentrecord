<div class="mat-table-container-productapi">

    <div *ngIf="apiError" class="error-box">
        <div class="error-title">
            <i class="fa fa-exclamation-circle"></i>
            Unable to load products
        </div>

        <div class="error-text">
            {{ apiErrorMsg }}
        </div>
    </div>

    <div class="table-scroll-wrapper" *ngIf="!apiError">

        <table mat-table [dataSource]="filterCategoriesApi" class="full-width-table">

             <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef>ID</th>
                <td mat-cell *matCellDef="let product">{{ product.id }}</td>
            </ng-container>

             <ng-container matColumnDef="title">
                <th mat-header-cell *matHeaderCellDef>Title</th>
                <td mat-cell *matCellDef="let product">
                    <span *ngIf="editId !== product.id">{{ product.title }}</span>
                    <input *ngIf="editId === product.id" [(ngModel)]="product.title">
                </td>
            </ng-container>

             <ng-container matColumnDef="price">
                <th mat-header-cell *matHeaderCellDef>Price</th>
                <td mat-cell *matCellDef="let product">
                    <span *ngIf="editId !== product.id">₹ {{ product.price }}</span>
                    <input *ngIf="editId === product.id" [(ngModel)]="product.price" type="number">
                </td>
            </ng-container>

             <ng-container matColumnDef="category">
                <th mat-header-cell *matHeaderCellDef>Category</th>
                <td mat-cell *matCellDef="let product">
                    <span *ngIf="editId !== product.id">{{ product.category }}</span>
                    <input *ngIf="editId === product.id" [(ngModel)]="product.category">
                </td>
            </ng-container>

             <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let product">

                     <button *ngIf="editId !== product.id" (click)="edit(product)">
                        Edit
                    </button>

                     <button *ngIf="editId === product.id" (click)="save(product)">
                        Save
                    </button>

                     <button *ngIf="editId === product.id" (click)="cancel()">
                        Cancel
                    </button>

                     <button (click)="delete(product.id)">
                        Delete
                    </button>

                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="productApiColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: productApiColumns;"></tr>
        </table>

    </div>

</div>
